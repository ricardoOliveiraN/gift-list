worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Load balancer back-end pool.
    upstream app_backend {
        # DIGITE O IP E PORTA DO SERVIDOR 1 AQUI.
        # Exemplo: server 10.0.0.10:3000;
        server 10.0.0.112:8080;

        # DIGITE O IP E PORTA DO SERVIDOR 2 AQUI (opcional).
        # Exemplo: server 10.0.0.11:3000;
        server 10.0.0.74:8080;

        # Algoritmo padrao: round-robin.
        # Para peso por servidor, use: server <IP>:<PORTA> weight=2;
    }

    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Aqui voce pode servir o front-end estatico (ou configurar outro upstream para o front).
        location / {
            try_files $uri /index.html;
        }
    }
}
